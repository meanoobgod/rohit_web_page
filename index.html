<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Dino Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            font-family: "Courier New", Courier, monospace;
        }

        #game {
            width: 600px;
            height: 200px;
            border-bottom: 2px solid #555;
            background-color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        #dino {
            width: 40px;
            height: 40px;
            background-color: #555;
            position: absolute;
            top: 160px; /* 200px height - 40px dino height */
            left: 50px;
            border-radius: 4px;
        }

        /* The jump animation class */
        .jump {
            animation: jump-anim 0.5s linear;
        }

        @keyframes jump-anim {
            0% { top: 160px; }
            40% { top: 70px; }
            50% { top: 60px; }
            60% { top: 70px; }
            100% { top: 160px; }
        }

        #cactus {
            width: 20px;
            height: 40px;
            background-color: #d9534f;
            position: absolute;
            top: 160px;
            left: 600px;
            border-radius: 4px;
        }

        /* The obstacle moving animation */
        .move-cactus {
            animation: block-anim 1.5s infinite linear;
        }

        @keyframes block-anim {
            0% { left: 600px; }
            100% { left: -20px; }
        }

        #score-container {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #d9534f;
            display: none;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="game">
        <div id="score-container">Score: <span id="score">0</span></div>
        <div id="dino"></div>
        <div id="cactus" class="move-cactus"></div>
        
        <div id="game-over">
            GAME OVER!<br>
            <span style="font-size: 16px; color: #555;">Press Space to Restart</span>
        </div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreElement = document.getElementById("score");
        const gameOverScreen = document.getElementById("game-over");

        let isJumping = false;
        let score = 0;
        let gameLoop;
        let scoreLoop;
        let isGameOver = false;

        // Function to handle the jump
        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            dino.classList.add("jump");

            // Remove the jump class after the animation ends (0.5s = 500ms)
            setTimeout(() => {
                dino.classList.remove("jump");
                isJumping = false;
            }, 500);
        }

        // Initialize and reset game state
        function startGame() {
            isGameOver = false;
            score = 0;
            scoreElement.innerText = score;
            gameOverScreen.style.display = "none";
            
            // Restart cactus animation
            cactus.style.animation = "none";
            cactus.offsetHeight; // Trigger reflow to reset animation
            cactus.style.animation = "block-anim 1.5s infinite linear";

            // Increment score every 100ms
            scoreLoop = setInterval(() => {
                score++;
                scoreElement.innerText = score;
            }, 100);

            // Main game loop for collision detection (runs every 10ms)
            gameLoop = setInterval(() => {
                // Get current vertical position of the dino
                let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
                // Get current horizontal position of the cactus
                let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

                // Check for collision
                // Dino occupies X-coordinates from 50 to 90 (left: 50 + width: 40)
                // Cactus width is 20
                if (cactusLeft > 50 && cactusLeft < 90 && dinoTop >= 120) {
                    endGame(cactusLeft);
                }
            }, 10);
        }

        // Stop the game when collision occurs
        function endGame(cactusCurrentLeft) {
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(scoreLoop);
            
            // Freeze the cactus exactly where it hit the dino
            cactus.style.animation = "none";
            cactus.style.left = cactusCurrentLeft + "px";
            
            // Show Game Over screen
            gameOverScreen.style.display = "block";
        }

        // Event Listeners for controls
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space" || event.code === "ArrowUp") {
                if (isGameOver) {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        // Touch support for mobile devices
        document.addEventListener("touchstart", function() {
            if (isGameOver) {
                startGame();
            } else {
                jump();
            }
        });

        // Start the game immediately on load
        startGame();
    </script>

</body>
</html>
